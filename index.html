<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gratitude Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <p>Loading your garden…</p>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none">

    <div class="status-bar" id="status-bar"></div>

    <!-- Header -->
    <header class="header">
      <h1>My Gratitude Garden</h1>
      <p>One seed of gratitude, planted daily</p>
      <div id="streak-container"></div>
      <div id="user-info"></div>
    </header>

    <!-- Journal entry form -->
    <section class="journal-section">
      <div class="entry-card">
        <div class="date-label" id="today-label"></div>
        <div id="journal-content"></div>
      </div>
    </section>

    <!-- Visual garden -->
    <section class="garden-section">
      <p class="garden-title">Your Garden</p>
      <p class="garden-counter" id="garden-counter"></p>
      <div class="garden-frame">
        <div class="sky">
          <div class="sun"></div>
          <div class="cloud cloud1"></div>
          <div class="cloud cloud2"></div>
        </div>
        <div class="soil-strip"></div>
        <div class="garden-floor" id="garden-floor">
          <p class="empty-msg">Your garden awaits its first seed…</p>
        </div>
      </div>
      <p class="hint">Hover over a plant to read the entry</p>
    </section>

    <!-- Past entries list -->
    <section class="entries-section" id="entries-section" style="display:none">
      <p class="entries-title">Past entries</p>
      <div id="entries-list"></div>
    </section>

  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Our scripts - redoslijed je važan! -->
  <script src="js/config.js"></script>
  <script src="js/plants.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
