<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gratitude Garden</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #FAF6EE;
            --parchment: #F2EBD9;
            --bark: #8B6F52;
            --soil: #3D2B1F;
            --soil-light: #5C3D2E;
            --grass: #2E5E2E;
            --grass-light: #4A8C4A;
            --sage: #7A9E7E;
            --ink: #2C2018;
            --ink-soft: #5A4A3A;
            --gold: #C8922A;
            --terracotta: #C4704F;
        }

        body {
            font-family: 'Lora', serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 3rem 1rem 1.5rem;
            position: relative;
        }

        .header::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background: var(--gold);
            margin: 1.2rem auto 0;
            border-radius: 2px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            color: var(--soil);
            letter-spacing: -0.02em;
        }

        .header p {
            font-style: italic;
            color: var(--ink-soft);
            font-size: 1rem;
            margin-top: 0.4rem;
        }

        .streak-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--soil);
            color: var(--parchment);
            font-family: 'Lora', serif;
            font-size: 0.8rem;
            padding: 4px 14px;
            border-radius: 20px;
            margin-top: 1rem;
            letter-spacing: 0.04em;
        }

        /* JOURNAL SECTION */
        .journal-section {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 1.2rem 2rem;
        }

        .entry-card {
            background: var(--parchment);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid #D9CDB8;
            position: relative;
            overflow: hidden;
        }

        .entry-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--grass), var(--gold), var(--terracotta));
            border-radius: 16px 16px 0 0;
        }

        .date-label {
            font-family: 'Lora', serif;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            color: var(--bark);
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .entry-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--soil);
            margin-bottom: 1.2rem;
            font-weight: 400;
            font-style: italic;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #C8BBA8;
            border-radius: 10px;
            padding: 1rem;
            font-family: 'Lora', serif;
            font-size: 1rem;
            color: var(--ink);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.7;
        }

        textarea::placeholder {
            color: #B0A090;
            font-style: italic;
        }

        textarea:focus {
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(122, 158, 126, 0.18);
        }

        .plant-btn {
            display: block;
            width: 100%;
            margin-top: 1rem;
            padding: 0.85rem;
            background: var(--grass);
            color: #E8F5E8;
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.02em;
        }

        .plant-btn:hover {
            background: var(--grass-light);
        }

        .plant-btn:active {
            transform: scale(0.98);
        }

        .plant-btn:disabled {
            background: #9BB89B;
            cursor: default;
        }

        /* ALREADY PLANTED */
        .already-planted {
            text-align: center;
            padding: 1.5rem 0 0.5rem;
        }

        .already-planted .check-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .already-planted p {
            color: var(--ink-soft);
            font-style: italic;
            font-size: 0.95rem;
        }

        .entry-preview {
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            border-left: 3px solid var(--sage);
            font-style: italic;
            color: var(--ink-soft);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        /* GARDEN */
        .garden-section {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 1.2rem 4rem;
        }

        .garden-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--soil);
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 400;
            font-style: italic;
        }

        .garden-frame {
            background: var(--grass);
            border-radius: 20px;
            overflow: hidden;
            min-height: 280px;
            position: relative;
            box-shadow: 0 8px 32px rgba(46, 94, 46, 0.25), inset 0 -4px 12px rgba(0, 0, 0, 0.15);
        }

        .sky {
            height: 80px;
            background: linear-gradient(180deg, #B8D8E8 0%, #D4EAD4 100%);
            position: relative;
        }

        .sun {
            position: absolute;
            top: 14px;
            right: 40px;
            width: 36px;
            height: 36px;
            background: #F5C842;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(245, 200, 66, 0.6);
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
        }

        .cloud1 {
            top: 20px;
            left: 30px;
            width: 60px;
            height: 18px;
        }

        .cloud1::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 12px;
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }

        .cloud2 {
            top: 30px;
            left: 130px;
            width: 45px;
            height: 14px;
        }

        .cloud2::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 8px;
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }

        .soil-strip {
            background: var(--soil);
            height: 20px;
            position: relative;
        }

        .soil-strip::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 0;
            right: 0;
            height: 10px;
            background: var(--soil-light);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .garden-floor {
            background: var(--soil);
            min-height: 180px;
            padding: 10px 16px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 8px 4px;
        }

        .empty-garden {
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            color: rgba(255, 255, 255, 0.35);
            font-style: italic;
            font-size: 0.88rem;
            letter-spacing: 0.04em;
        }

        /* PLANTS */
        .plant-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: growUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            cursor: pointer;
            position: relative;
        }

        .plant-wrapper:hover .plant-tooltip {
            opacity: 1;
            transform: translateY(-4px);
        }

        .plant-tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--soil);
            color: var(--parchment);
            font-family: 'Lora', serif;
            font-size: 0.72rem;
            padding: 6px 10px;
            border-radius: 8px;
            white-space: nowrap;
            max-width: 180px;
            white-space: normal;
            text-align: center;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 10;
        }

        .plant-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: var(--soil);
        }

        .plant-date-tip {
            font-size: 0.62rem;
            opacity: 0.7;
            display: block;
            margin-top: 2px;
        }

        @keyframes growUp {
            from {
                transform: scaleY(0);
                transform-origin: bottom;
                opacity: 0;
            }

            to {
                transform: scaleY(1);
                transform-origin: bottom;
                opacity: 1;
            }
        }

        /* PAST ENTRIES */
        .entries-section {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 1.2rem 3rem;
        }

        .entries-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--soil);
            margin-bottom: 1.2rem;
            font-weight: 400;
            font-style: italic;
            text-align: center;
        }

        .entry-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            padding: 1rem 0;
            border-bottom: 1px dashed #D9CDB8;
        }

        .entry-item:last-child {
            border-bottom: none;
        }

        .entry-plant-icon {
            flex-shrink: 0;
        }

        .entry-content {}

        .entry-item-date {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--bark);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .entry-item-text {
            font-size: 0.9rem;
            color: var(--ink-soft);
            line-height: 1.6;
            font-style: italic;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .entry-card {
                padding: 1.5rem 1.2rem;
            }

            .garden-floor {
                gap: 6px 2px;
            }
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PLANT_COLORS = [
            { stem: '#4A8C4A', bloom: '#E8627A', center: '#F5C842' }, // Pink flower
            { stem: '#3D7A3D', bloom: '#F5C842', center: '#C8922A' }, // Sunflower
            { stem: '#5A9A5A', bloom: '#9B8EC4', center: '#7A6AB0' }, // Lavender
            { stem: '#4A8C4A', bloom: '#E87A3D', center: '#F5C842' }, // Orange
            { stem: '#3D7A3D', bloom: '#7BADC4', center: '#5A9AB8' }, // Blue
            { stem: '#5A9A5A', bloom: '#E8C87A', center: '#C8922A' }, // Yellow
            { stem: '#4A8C4A', bloom: '#C47A9A', center: '#E8A0C4' }, // Rose
        ];

        const PLANT_TYPES = ['daisy', 'tulip', 'sunflower', 'wildflower', 'mushroom'];

        function DaisyPlant({ color, size = 42 }) {
            const s = size / 42;
            const petals = 8;
            return (
                <svg width={size} height={size * 1.4} viewBox={`0 0 42 60`} fill="none">
                    {/* Stem */}
                    <path d={`M21 58 Q19 48 21 38`} stroke={color.stem} strokeWidth="2.5" strokeLinecap="round" />
                    <path d={`M21 48 Q16 44 14 40`} stroke={color.stem} strokeWidth="1.5" strokeLinecap="round" />
                    {/* Petals */}
                    {Array.from({ length: petals }).map((_, i) => {
                        const angle = (i * 360) / petals;
                        const rad = (angle * Math.PI) / 180;
                        const px = 21 + Math.cos(rad) * 8;
                        const py = 22 + Math.sin(rad) * 8;
                        return (
                            <ellipse key={i}
                                cx={px} cy={py}
                                rx="4" ry="2.5"
                                fill={color.bloom}
                                opacity="0.9"
                                transform={`rotate(${angle}, ${px}, ${py})`}
                            />
                        );
                    })}
                    {/* Center */}
                    <circle cx="21" cy="22" r="5" fill={color.center} />
                    <circle cx="21" cy="22" r="3" fill={color.center} opacity="0.7" />
                </svg>
            );
        }

        function TulipPlant({ color, size = 42 }) {
            return (
                <svg width={size} height={size * 1.4} viewBox="0 0 42 60" fill="none">
                    <path d="M21 58 Q20 48 21 36" stroke={color.stem} strokeWidth="2.5" strokeLinecap="round" />
                    <path d="M21 50 Q26 44 28 38" stroke={color.stem} strokeWidth="1.5" strokeLinecap="round" />
                    {/* Tulip head */}
                    <path d="M14 30 Q14 18 21 16 Q28 18 28 30 Q28 36 21 38 Q14 36 14 30Z" fill={color.bloom} />
                    <path d="M21 16 Q21 24 21 38" stroke={color.center} strokeWidth="1" opacity="0.4" />
                    <path d="M16 20 Q18 28 18 38" stroke={color.center} strokeWidth="0.8" opacity="0.3" />
                    <path d="M26 20 Q24 28 24 38" stroke={color.center} strokeWidth="0.8" opacity="0.3" />
                </svg>
            );
        }

        function SunflowerPlant({ color, size = 42 }) {
            const petals = 12;
            return (
                <svg width={size} height={size * 1.4} viewBox="0 0 42 60" fill="none">
                    <path d="M21 58 Q20 46 21 34" stroke={color.stem} strokeWidth="2.5" strokeLinecap="round" />
                    <path d="M21 48 Q16 42 13 38" stroke={color.stem} strokeWidth="1.5" strokeLinecap="round" />
                    {Array.from({ length: petals }).map((_, i) => {
                        const angle = (i * 360) / petals;
                        const rad = (angle * Math.PI) / 180;
                        const px = 21 + Math.cos(rad) * 9;
                        const py = 20 + Math.sin(rad) * 9;
                        return (
                            <ellipse key={i}
                                cx={px} cy={py} rx="4.5" ry="2"
                                fill={color.bloom} opacity="0.85"
                                transform={`rotate(${angle}, ${px}, ${py})`}
                            />
                        );
                    })}
                    <circle cx="21" cy="20" r="7" fill="#3D2B1F" />
                    <circle cx="21" cy="20" r="5" fill="#2C1F15" />
                    {Array.from({ length: 8 }).map((_, i) => {
                        const a = (i * 45 * Math.PI) / 180;
                        return <circle key={i} cx={21 + Math.cos(a) * 3} cy={20 + Math.sin(a) * 3} r="0.8" fill="#C8922A" opacity="0.6" />;
                    })}
                </svg>
            );
        }

        function WildflowerPlant({ color, size = 38 }) {
            return (
                <svg width={size} height={size * 1.4} viewBox="0 0 38 54" fill="none">
                    <path d="M19 52 Q18 42 19 30" stroke={color.stem} strokeWidth="2" strokeLinecap="round" />
                    <path d="M12 38 Q17 34 19 30 Q21 34 26 38" stroke={color.stem} strokeWidth="1.5" strokeLinecap="round" fill="none" />
                    {/* Star petals */}
                    {[0, 60, 120, 180, 240, 300].map((angle, i) => {
                        const rad = (angle * Math.PI) / 180;
                        const x2 = 19 + Math.cos(rad) * 9;
                        const y2 = 18 + Math.sin(rad) * 9;
                        return <line key={i} x1="19" y1="18" x2={x2} y2={y2} stroke={color.bloom} strokeWidth="3" strokeLinecap="round" />;
                    })}
                    <circle cx="19" cy="18" r="4.5" fill={color.center} />
                </svg>
            );
        }

        function MushroomPlant({ color, size = 36 }) {
            return (
                <svg width={size} height={size * 1.2} viewBox="0 0 36 44" fill="none">
                    <rect x="15" y="26" width="6" height="14" rx="2" fill="#D4B896" />
                    <ellipse cx="18" cy="26" rx="14" ry="10" fill={color.bloom} />
                    <ellipse cx="18" cy="26" rx="14" ry="10" fill="none" stroke={color.center} strokeWidth="0.5" opacity="0.3" />
                    {[8, 14, 22, 28].map((x, i) => (
                        <circle key={i} cx={x} cy={22 + (i % 2) * 3} r="2" fill="rgba(255,255,255,0.5)" />
                    ))}
                    <ellipse cx="18" cy="34" rx="8" ry="2" fill="rgba(0,0,0,0.1)" />
                </svg>
            );
        }

        const PLANT_COMPONENTS = {
            daisy: DaisyPlant,
            tulip: TulipPlant,
            sunflower: SunflowerPlant,
            wildflower: WildflowerPlant,
            mushroom: MushroomPlant,
        };

        function Plant({ entry, size }) {
            const PlantComp = PLANT_COMPONENTS[entry.plantType] || DaisyPlant;
            const color = PLANT_COLORS[entry.colorIdx % PLANT_COLORS.length];
            return (
                <div className="plant-wrapper" style={{ animationDelay: `${entry.animDelay || 0}ms` }}>
                    <div className="plant-tooltip">
                        {entry.text.length > 60 ? entry.text.slice(0, 60) + '…' : entry.text}
                        <span className="plant-date-tip">{formatDate(entry.date)}</span>
                    </div>
                    <PlantComp color={color} size={size || 42} />
                </div>
            );
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function calcStreak(entries) {
            if (!entries.length) return 0;
            const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));
            let streak = 0;
            let current = new Date(getToday());
            for (const e of sorted) {
                const eDate = new Date(e.date + 'T12:00:00');
                const diff = Math.round((current - eDate) / 86400000);
                if (diff === 0 || diff === 1) {
                    streak++;
                    current = eDate;
                } else {
                    break;
                }
            }
            return streak;
        }

        function App() {
            const [entries, setEntries] = useState([]);
            const [text, setText] = useState('');
            const [justPlanted, setJustPlanted] = useState(false);
            const today = getToday();
            const todayEntry = entries.find(e => e.date === today);
            const streak = calcStreak(entries);
            const pastEntries = [...entries].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 20);

            useEffect(() => {
                const saved = localStorage.getItem('gratitude-garden-entries');
                if (saved) {
                    try { setEntries(JSON.parse(saved)); } catch (e) { }
                }
            }, []);

            const saveEntry = () => {
                if (!text.trim()) return;
                const newEntry = {
                    id: Date.now(),
                    date: today,
                    text: text.trim(),
                    plantType: PLANT_TYPES[Math.floor(Math.random() * PLANT_TYPES.length)],
                    colorIdx: Math.floor(Math.random() * PLANT_COLORS.length),
                    animDelay: 0,
                };
                const updated = [...entries.filter(e => e.date !== today), newEntry];
                setEntries(updated);
                localStorage.setItem('gratitude-garden-entries', JSON.stringify(updated));
                setJustPlanted(true);
                setTimeout(() => setJustPlanted(false), 3000);
            };

            const gardenEntries = [...entries].sort((a, b) => a.date.localeCompare(b.date));

            return (
                <div>
                    {/* HEADER */}
                    <div className="header">
                        <h1>My Gratitude Garden</h1>
                        <p>One seed of gratitude, planted daily</p>
                        {streak > 0 && (
                            <div>
                                <span className="streak-badge">
                                    🌱 {streak} day streak
                                </span>
                            </div>
                        )}
                    </div>

                    {/* JOURNAL */}
                    <div className="journal-section">
                        <div className="entry-card">
                            <div className="date-label">{formatDate(today)}</div>
                            {!todayEntry ? (
                                <>
                                    <h2>What are you grateful for today?</h2>
                                    <textarea
                                        value={text}
                                        onChange={e => setText(e.target.value)}
                                        placeholder="Today I'm grateful for…"
                                        rows={4}
                                    />
                                    <button className="plant-btn" onClick={saveEntry} disabled={!text.trim()}>
                                        🌱 Plant a seed
                                    </button>
                                </>
                            ) : (
                                <div className="already-planted">
                                    <span className="check-icon">🌸</span>
                                    <p>Your seed is planted for today. Come back tomorrow.</p>
                                    <div className="entry-preview">"{todayEntry.text}"</div>
                                </div>
                            )}
                            {justPlanted && (
                                <div style={{ textAlign: 'center', marginTop: '1rem', color: '#4A8C4A', fontStyle: 'italic', fontSize: '0.9rem' }}>
                                    ✨ A new plant appeared in your garden!
                                </div>
                            )}
                        </div>
                    </div>

                    {/* GARDEN */}
                    <div className="garden-section">
                        <p className="garden-title">Your Garden</p>
                        <div className="garden-frame">
                            <div className="sky">
                                <div className="sun"></div>
                                <div className="cloud cloud1"></div>
                                <div className="cloud cloud2"></div>
                            </div>
                            <div className="soil-strip"></div>
                            <div className="garden-floor">
                                {gardenEntries.length === 0 ? (
                                    <p className="empty-garden">Your garden awaits its first seed…</p>
                                ) : (
                                    gardenEntries.map((entry, i) => (
                                        <Plant key={entry.id} entry={entry} size={entry.date === today ? 46 : 38} />
                                    ))
                                )}
                            </div>
                        </div>
                        <p style={{ textAlign: 'center', fontSize: '0.75rem', color: '#A09080', marginTop: '0.8rem', fontStyle: 'italic' }}>
                            Hover over a plant to read the entry
                        </p>
                    </div>

                    {/* PAST ENTRIES */}
                    {pastEntries.length > 1 && (
                        <div className="entries-section">
                            <p className="entries-title">Past entries</p>
                            {pastEntries.map(entry => {
                                const PlantComp = PLANT_COMPONENTS[entry.plantType] || DaisyPlant;
                                const color = PLANT_COLORS[entry.colorIdx % PLANT_COLORS.length];
                                return (
                                    <div key={entry.id} className="entry-item">
                                        <div className="entry-plant-icon">
                                            <PlantComp color={color} size={32} />
                                        </div>
                                        <div className="entry-content">
                                            <div className="entry-item-date">{formatDate(entry.date)}</div>
                                            <div className="entry-item-text">"{entry.text}"</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
